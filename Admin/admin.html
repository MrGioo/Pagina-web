<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel de Dios - Baity Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        /* Un fondo más oscuro y "hacker" solo para esta página */
        body { background-color: #0a0a0a; color: #fff; }
    </style>
</head>
<body>
    <div class="container" style="margin-top: 3rem;">
        <div class="feature-card form-card" style="border: 2px solid #ff4500; box-shadow: 0 0 20px rgba(255, 69, 0, 0.2); max-width: 1000px; margin: 0 auto;">
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="color: #ff4500; margin: 0;">Panel del Dios BaityBait</h2>
                <a href="../index.html" class="btn-outline" style="text-decoration: none; padding: 5px 15px; font-size: 14px;">Volver al juego</a>
            </div>
            
            <p class="form-desc" style="text-align: left; margin-top: 10px;">Gestión de incautos y lamentos. Acceso Nivel Administrador.</p>
            
            <div style="display: flex; gap: 20px; margin-top: 2rem; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 300px; background: #141414; padding: 20px; border-radius: 8px; border: 1px solid #333;">
                    <h3 style="color: var(--primary); margin-bottom: 15px;">🪲 Quejas Recibidas</h3>
                    <div id="admin-lista-tickets" class="tickets-container" style="max-height: 400px; overflow-y: auto; padding-right: 10px;"></div>
                    <button id="btn-quemar-tickets" class="btn-primary btn-peligro" style="margin-top: 1.5rem; width: 100%; background: #dc3545;">🔥 Borrar todos los Bugs</button>
                </div>

                <div style="flex: 1; min-width: 300px; background: #141414; padding: 20px; border-radius: 8px; border: 1px solid #333;">
                    <h3 style="color: var(--primary); margin-bottom: 15px;">👥 Incautos Registrados</h3>
                    <div id="admin-lista-usuarios" class="tickets-container" style="max-height: 400px; overflow-y: auto; padding-right: 10px;"></div>
                    <button id="btn-borrar-usuarios" class="btn-primary btn-peligro" style="margin-top: 1.5rem; width: 100%; background: #dc3545;">💀 Banear a todos (Reset DB)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="Admin_JS/admin.js"></script>
</body>
</html>
